name: Update Japan Customs Trade Data

on:
  workflow_dispatch:
    inputs:
      year_month:
        description: "Target month (YYYY-MM). Leave blank for previous month."
        required: false
        type: string
      dry_run:
        description: "Run without updating CSV files"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 21 17 * *"

concurrency:
  group: update-trade-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch
        env:
          INPUT_YEAR_MONTH: ${{ github.event.inputs.year_month }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          args=()
          if [ -n "$INPUT_YEAR_MONTH" ]; then
            args+=(--year-month "$INPUT_YEAR_MONTH")
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          python src/main.py "${args[@]}"

      - name: Commit CSV updates
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw_trade.csv
          git add data/calc_unit_price.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git commit -m "Update customs trade data"
          git push origin HEAD:main
